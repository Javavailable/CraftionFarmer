name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build plugin
        run: mvn -B clean package

      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="build-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
          JAR_PATH="$(find target -maxdepth 1 -type f -name '*.jar' ! -name 'original-*' | head -n 1)"

          if [ -z "$JAR_PATH" ]; then
            echo "Build jar not found in target/." >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "jar_path=$JAR_PATH" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          SHORT_SHA: ${{ steps.meta.outputs.short_sha }}
          JAR_PATH: ${{ steps.meta.outputs.jar_path }}
        run: |
          gh release create "$TAG" "$JAR_PATH" \
            --target "$GITHUB_SHA" \
            --title "CraftionFarmer $VERSION ($SHORT_SHA)" \
            --notes "Automated CraftionFarmer release for commit $GITHUB_SHA."

settings:
  debug: false
  language: tr

commands:
  main-command: farmer

hooks:
  region:
    provider: SKYLLIA
    skyllia:
      allow-trusted-players: true
      require-skyblock-world: true
      sync-members-on-open: true
  skyllia-sync:
    enabled: true
    remove-farmer-on-island-delete: true
    reconcile-on-command: true
    reconcile-on-menu-open: true
  visual:
    provider: FANCY_NPCS
    fancynpcs:
      api-mode: AUTO
      id-prefix: "craftion-farmer-"
      save-npcs-to-file: false
      remove-on-farmer-delete: true

npc:
  enabled: true
  type: VILLAGER
  name: "<#38BDF8>біД АбіА“УбіЫ…™біП…і біД…™“УбіЫбіД…™"
  glowing: true
  glowing-color: AQUA
  turn-to-player: true
  interaction-cooldown: 0.5
  visibility-distance: 48

collect:
  enabled: true
  default-state: true
  ignore-player-drops: true
  ignore-items-with-meta: true
  max-storage-per-item: -1
  save-delay-ticks: 40
  allowed-materials:
    - WHEAT
    - CARROT
    - POTATO
    - BEETROOT
    - CACTUS
    - SUGAR_CANE
    - BAMBOO
    - MELON_SLICE
    - PUMPKIN
    - COCOA_BEANS
    - SWEET_BERRIES
    - NETHER_WART

storage:
  withdraw:
    allow-members: true

economy:
  provider: VAULT
  tax:
    enabled: true
    rate: 0.05

prices:
  wheat: 2.0
  carrot: 2.0
  potato: 2.0
  beetroot: 2.5
  cactus: 1.5
  sugar_cane: 1.5
  bamboo: 1.0
  melon_slice: 1.0
  pumpkin: 4.0
  cocoa_beans: 2.0
  sweet_berries: 2.0
  nether_wart: 3.0

modules:
  auto-sell:
    enabled: true
    default-state: false
    permission: "craftionfarmer.module.auto-sell"
    interval-seconds: 60
  production-calc:
    enabled: true
    default-state: true
    permission: "craftionfarmer.module.production-calc"
  auto-harvest:
    enabled: true
    default-state: false
    permission: "craftionfarmer.module.auto-harvest"
    prevent-growth-when-full: true
    check-stock: true
    require-piston: false
    check-all-directions: false
    crops:
      - WHEAT
      - CARROT
      - POTATO
      - BEETROOT
      - PUMPKIN
      - MELON_SLICE
      - CACTUS
      - SUGAR_CANE
      - BAMBOO
      - COCOA_BEANS
      - SWEET_BERRIES
      - NETHER_WART
  auto-kill:
    enabled: false
    default-state: false
    permission: "craftionfarmer.module.auto-kill"


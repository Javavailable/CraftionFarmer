          action: "info"
          lore:
            - "<#CBD5E1>ᴀᴅᴀ <#94A3B8>• <#E0F2FE>%region%"
            - "<#CBD5E1>sᴀʜɪᴘ <#94A3B8>• <#E0F2FE>%owner%"
            - "<#CBD5E1>sᴇᴠɪʏᴇ <#94A3B8>• <#E0F2FE>%level%"

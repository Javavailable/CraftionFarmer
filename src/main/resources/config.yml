settings:
  debug: false
  language: tr

commands:
  main-command: farmer

hooks:
  region:
    provider: SKYLLIA
    skyllia:
      allow-trusted-players: true
      require-skyblock-world: true
      sync-members-on-open: true
  skyllia-sync:
    enabled: true
    remove-farmer-on-island-delete: true
    reconcile-on-command: true
    reconcile-on-menu-open: true
  visual:
    provider: FANCY_NPCS
    fancynpcs:
      api-mode: AUTO
      id-prefix: "craftion-farmer-"
      save-npcs-to-file: false
      remove-on-farmer-delete: true

npc:
  enabled: true
  type: VILLAGER
  name: "<#38BDF8>ᴄʀᴀғᴛɪᴏɴ ᴄɪғᴛᴄɪ"
  glowing: true
  glowing-color: AQUA
  turn-to-player: true
  interaction-cooldown: 0.5
  visibility-distance: 48

collect:
  enabled: true
  default-state: true
  ignore-player-drops: true
  ignore-items-with-meta: true
  max-storage-per-item: -1
  save-delay-ticks: 40
  allowed-materials:
    - WHEAT
    - CARROT
    - POTATO
    - BEETROOT
    - CACTUS
    - SUGAR_CANE
    - BAMBOO
    - MELON_SLICE
    - PUMPKIN
    - COCOA_BEANS
    - SWEET_BERRIES
    - NETHER_WART
    - WHEAT_SEEDS
    - BEETROOT_SEEDS

storage:
  withdraw:
    allow-members: true

economy:
  provider: VAULT
  tax:
    enabled: true
    rate: 0.05

prices:
  wheat: 2.0
  carrot: 2.0
  potato: 2.0
  beetroot: 2.5
  cactus: 1.5
  sugar_cane: 1.5
  bamboo: 1.0
  melon_slice: 1.0
  pumpkin: 4.0
  cocoa_beans: 2.0
  sweet_berries: 2.0
  nether_wart: 3.0
  wheat_seeds: 0.25
  beetroot_seeds: 0.25

modules:
  auto-sell:
    enabled: true
    default-state: false
    permission: "craftionfarmer.module.auto-sell"
    interval-seconds: 60
  production-calc:
    enabled: true
    default-state: true
    permission: "craftionfarmer.module.production-calc"
  auto-harvest:
    enabled: true
    default-state: false
    permission: "craftionfarmer.module.auto-harvest"
    prevent-growth-when-full: true
    check-stock: true
    require-piston: false
    check-all-directions: false
    crops:
      - WHEAT
      - CARROT
      - POTATO
      - BEETROOT
      - PUMPKIN
      - MELON_SLICE
      - CACTUS
      - SUGAR_CANE
      - BAMBOO
      - COCOA_BEANS
      - SWEET_BERRIES
      - NETHER_WART
  auto-kill:
    enabled: false
    default-state: false
    permission: "craftionfarmer.module.auto-kill"

gui:
  menus:
    main:
      size: 54
      items:
        "4":
          id: info
          material: PLAYER_HEAD
          action: "info"
        "36":
          id: storage
          material: BARREL
          action: "open:storage"
        "38":
          id: manage
          material: HOPPER
          action: "open:manage"
        "40":
          id: modules
          material: AMETHYST_SHARD
          action: "open:modules"
        "42":
          id: members
          material: OAK_SIGN
          action: "open:members"
        "44":
          id: sell-all
          material: EMERALD
          action: "sell:all"
        "49":
          id: close
          material: BARRIER
          action: "close"
      product-items:
        slots: [10, 11, 12, 13, 14, 15, 16, 19, 20, 21, 22, 23, 24, 25]
        item:
          id: product
          material: "%material%"
          action: "open:product:%material%"
        empty:
          id: empty
          material: BARREL
          action: "info"
        previous-page:
          id: previous-page
          slot: 30
          material: ARROW
          action: "open:main:%previous_page%"
        page-indicator:
          id: page-indicator
          slot: 31
          material: MAP
          action: "info"
        next-page:
          id: next-page
          slot: 32
          material: ARROW
          action: "open:main:%next_page%"
    product:
      size: 54
      items:
        "4":
          id: info
          material: "%product_material%"
          action: "info"
        "20":
          id: toggle
          material: REDSTONE_TORCH
          action: "product-toggle:%material%"
        "22":
          id: sell-amount
          material: EMERALD
          action: "sell-dialog:%material%"
        "24":
          id: withdraw-amount
          material: CHEST
          action: "withdraw-dialog:%material%"
        "30":
          id: sell-all
          material: GOLD_INGOT
          action: "sell:%material%:all"
        "32":
          id: withdraw-space
          material: HOPPER
          action: "withdraw:%material%:all"
        "45":
          id: back
          material: ARROW
          action: "back"
        "49":
          id: close
          material: BARRIER
          action: "close"
    storage:
      size: 54
      items:
        "4":
          id: info
          material: CHEST
          action: "info"
        "45":
          id: back
          material: ARROW
          action: "back"
        "49":
          id: close
          material: BARRIER
          action: "close"
        "53":
          id: sell-all
          material: EMERALD
          action: "sell:all"
      storage-items:
        slots: [10, 11, 12, 13, 14, 15, 16, 19, 20, 21, 22, 23, 24, 25, 28, 29, 30, 31, 32, 33, 34, 37, 38, 39, 40, 41, 42, 43]
        filled:
          id: filled
          material: "%material%"
          action: "withdraw:%material%:stack"
          right-action: "sell:%material%:all"
        empty:
          id: empty
          material: BARREL
          action: "info"
    manage:
      size: 54
      items:
        "4":
          id: info
          material: HOPPER
          action: "info"
        "20":
          id: collecting
          material: REDSTONE_TORCH
          action: "collect-toggle"
        "22":
          id: members
          material: OAK_SIGN
          action: "open:members"
        "24":
          id: modules
          material: AMETHYST_SHARD
          action: "open:modules"
        "45":
          id: back
          material: ARROW
          action: "back"
        "49":
          id: close
          material: BARRIER
          action: "close"
    members:
      size: 54
      items:
        "4":
          id: info
          material: OAK_SIGN
          action: "info"
        "45":
          id: back
          material: ARROW
          action: "back"
        "49":
          id: close
          material: BARRIER
          action: "close"
      member-items:
        slots: [10, 11, 12, 13, 14, 15, 16, 19, 20, 21, 22, 23, 24, 25, 28, 29, 30, 31, 32, 33, 34]
        item:
          id: item
          material: PLAYER_HEAD
          action: "info"
    modules:
      size: 54
      items:
        "4":
          id: info
          material: AMETHYST_SHARD
          action: "info"
        "45":
          id: back
          material: ARROW
          action: "back"
        "49":
          id: close
          material: BARRIER
          action: "close"
      module-items:
        slots: [19, 20, 21, 22, 23, 24, 25]
        enabled:
          id: enabled
          material: "%module_material%"
          action: "module-toggle:%module_key%"
        disabled:
          id: disabled
          material: "%module_material%"
          action: "module-toggle:%module_key%"
        locked:
          id: locked
          material: "%module_material%"
          action: "module-toggle:%module_key%"
        unavailable:
          id: unavailable
          material: "%module_material%"
          action: "module-toggle:%module_key%"
        empty:
          id: empty
          material: AMETHYST_SHARD
          action: "info"

database:
  type: SQLITE
  sqlite:
    file: "craftionfarmer.db"
  mysql:
    host: "localhost"
    port: 3306
    database: "craftionfarmer"
    username: "root"
    password: ""
    pool-size: 10

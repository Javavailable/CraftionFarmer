settings:
  debug: false
  language: tr

commands:
  main-command: farmer

hooks:
  region:
    provider: SKYLLIA
    skyllia:
      allow-trusted-players: true
      require-skyblock-world: true
      sync-members-on-open: true
  skyllia-sync:
    enabled: true
    remove-farmer-on-island-delete: true
    reconcile-on-command: true
    reconcile-on-menu-open: true
  visual:
    provider: FANCY_NPCS
    fancynpcs:
      api-mode: AUTO
      id-prefix: "craftion-farmer-"
      save-npcs-to-file: false
      remove-on-farmer-delete: true

npc:
  enabled: true
  type: VILLAGER
  name: "<#38BDF8>ᴄʀᴀғᴛɪᴏɴ ᴄɪғᴛᴄɪ"
  glowing: true
  glowing-color: AQUA
  turn-to-player: true
  interaction-cooldown: 0.5
  visibility-distance: 48

collect:
  enabled: true
  ignore-player-drops: true
  ignore-items-with-meta: true
  max-storage-per-item: -1
  save-delay-ticks: 40
  allowed-materials:
    - WHEAT
    - CARROT
    - POTATO
    - BEETROOT
    - CACTUS
    - SUGAR_CANE
    - BAMBOO
    - MELON_SLICE
    - PUMPKIN

storage:
  withdraw:
    allow-members: true

economy:
  provider: VAULT
  tax:
    enabled: true
    rate: 0.05

prices:
  wheat: 2.0
  carrot: 2.0
  potato: 2.0
  beetroot: 2.5
  cactus: 1.5
  sugar_cane: 1.5
  bamboo: 1.0
  melon_slice: 1.0
  pumpkin: 4.0

modules:
  auto-sell:
    enabled: true
    default-state: false
    interval-seconds: 60
  production-calc:
    enabled: true
    default-state: true
  auto-harvest:
    enabled: false
    default-state: false
  auto-kill:
    enabled: false
    default-state: false

gui:
  labels:
    collecting:
      enabled: "ᴀᴋᴛɪғ"
      disabled: "ᴅᴜʀᴀᴋʟᴀᴛɪʟᴅɪ"
    modules:
      enabled: "ᴀᴋᴛɪғ"
      disabled: "ᴘᴀsɪғ"
      unavailable: "ᴋᴀᴘᴀʟɪ"
    roles:
      owner: "ᴀᴅᴀ sᴀʜɪʙɪ"
      manager: "ʏᴏɴᴇᴛɪᴄɪ"
      member: "ᴜʏᴇ"
      viewer: "ɢᴏʀᴜɴᴛᴜʟᴇʏᴇɴ"
  material-names:
    wheat: "ʙᴜɢᴅᴀʏ"
    carrot: "ʜᴀᴠᴜᴄ"
    potato: "ᴘᴀᴛᴀᴛᴇs"
    beetroot: "ᴘᴀɴᴄᴀʀ"
    sugar_cane: "sᴇᴋᴇʀ ᴋᴀᴍɪsɪ"
    cactus: "ᴋᴀᴋᴛᴜs"
    bamboo: "ʙᴀᴍʙᴜ"
    melon_slice: "ᴋᴀʀᴘᴜᴢ"
    pumpkin: "ʙᴀʟ ᴋᴀʙᴀɢɪ"
    cobblestone: "ᴋɪʀɪᴋ ᴛᴀs"
    oak_log: "ᴍᴇsᴇ ᴋᴜᴛᴜɢᴜ"
  module-names:
    auto-sell: "ᴏᴛᴏ sᴀᴛɪs"
    production-calc: "ᴜʀᴇᴛɪᴍ ᴛᴀʜᴍɪɴɪ"
    auto-harvest: "ᴏᴛᴏ ʜᴀsᴀᴛ"
    auto-kill: "ᴏᴛᴏ ᴀᴠ"
  module-descriptions:
    auto-sell: "ᴅᴇᴘᴏᴅᴀᴋɪ ғɪʏᴀᴛʟɪ ᴜʀᴜɴʟᴇʀɪ ʙᴇʟɪʀʟɪ ᴀʀᴀʟɪᴋʟᴀ sᴀᴛᴀʀ"
    production-calc: "sᴏɴ ᴛᴏᴘʟᴀᴍᴀ ᴀᴋɪsɪɴᴀ ɢᴏʀᴇ ᴜʀᴇᴛɪᴍ ᴛᴀʜᴍɪɴɪ ɢᴏsᴛᴇʀɪʀ"
    auto-harvest: "ɢᴇʟᴇᴄᴇᴋ ᴘᴀᴋᴇᴛ ɪᴄɪɴ ʜᴀsᴀᴛ ᴍɪᴍᴀʀɪsɪ"
    auto-kill: "ɢᴇʟᴇᴄᴇᴋ ᴘᴀᴋᴇᴛ ɪᴄɪɴ ᴍᴏʙ ᴍɪᴍᴀʀɪsɪ"
  menus:
    main:
      title: "<#38BDF8>ᴄʀᴀғᴛɪᴏɴ ᴄɪғᴛᴄɪ"
      size: 54
      items:
